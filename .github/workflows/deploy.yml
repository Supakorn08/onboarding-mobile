name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure npm auth for @exim private registry
        env:
          AZ_PAT: ${{ secrets.AZURE_ARTIFACTS_TOKEN }}
        run: |
          # Azure Artifacts npm auth = base64(PAT) in _password (canonical format,
          # for both the /registry/ and /npm/ paths). Store the RAW PAT in the secret.
          B64=$(printf '%s' "$AZ_PAT" | base64 -w0)
          {
            echo "@exim:registry=https://pkgs.dev.azure.com/eximth/_packaging/eximth/npm/registry/"
            echo "registry=https://registry.npmjs.org/"
            echo "always-auth=true"
            echo "//pkgs.dev.azure.com/eximth/_packaging/eximth/npm/registry/:username=eximth"
            echo "//pkgs.dev.azure.com/eximth/_packaging/eximth/npm/registry/:_password=$B64"
            echo "//pkgs.dev.azure.com/eximth/_packaging/eximth/npm/registry/:email=npm@exim.go.th"
            echo "//pkgs.dev.azure.com/eximth/_packaging/eximth/npm/:username=eximth"
            echo "//pkgs.dev.azure.com/eximth/_packaging/eximth/npm/:_password=$B64"
            echo "//pkgs.dev.azure.com/eximth/_packaging/eximth/npm/:email=npm@exim.go.th"
          } > .npmrc

      - name: Diagnose Azure Artifacts auth
        env:
          AZ_PAT: ${{ secrets.AZURE_ARTIFACTS_TOKEN }}
        run: |
          echo "::group::Azure Artifacts auth diagnostics"
          echo "secret length = ${#AZ_PAT}  (raw Azure DevOps PAT is ~52 chars; base64 is ~72)"
          URL="https://pkgs.dev.azure.com/eximth/_packaging/eximth/npm/registry/@exim%2Fui-kit"
          echo -n "Basic  (eximth:rawPAT)    -> "; curl -s -o /dev/null -w "%{http_code}\n" -u "eximth:$AZ_PAT" "$URL" || echo "curl-fail"
          echo -n "Bearer (rawPAT)           -> "; curl -s -o /dev/null -w "%{http_code}\n" -H "Authorization: Bearer $AZ_PAT" "$URL" || echo "curl-fail"
          B64=$(printf '%s' "$AZ_PAT" | base64 -w0)
          echo -n "Bearer (base64-of-secret) -> "; curl -s -o /dev/null -w "%{http_code}\n" -H "Authorization: Bearer $B64" "$URL" || echo "curl-fail"
          echo "(200=ok, 401=auth-fail, 404=auth-ok-wrong-path)"
          echo "::endgroup::"

      - name: Install dependencies
        run: npm install

      - name: Build (production)
        run: npm run build

      - name: Create Cloudflare Pages project (first run only)
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create onboarding-mobile --production-branch main

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/onboarding-mobile/browser --project-name onboarding-mobile --branch main --commit-dirty=true
